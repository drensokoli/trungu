services:
  postgres:
    image: postgres:16-alpine
    container_name: family-tree-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: family
      POSTGRES_PASSWORD: family
      POSTGRES_DB: family_tree
    ports:
      - "5433:5432"
    volumes:
      - family-tree-pgdata:/var/lib/postgresql/data

volumes:
  family-tree-pgdata:
